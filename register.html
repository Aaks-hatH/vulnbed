<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — VulnBank</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 10px; padding: 28px 32px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    h1 { font-size: 1.3rem; color: #1a365d; margin-bottom: 20px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: .9rem; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #3182ce; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { width: 100%; padding: 10px; background: #1a365d; color: #fff; border: none; border-radius: 6px; font-weight: 600; font-size: .9rem; cursor: pointer; margin-top: 4px; }
    a { color: #3182ce; font-size: .84rem; }
    .back { text-align: center; margin-top: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Open an Account</h1>
  <!-- No CSRF token, no email verification, no rate limit -->
  <form method="POST" action="api/v1/auth/register">
    <div class="row">
      <div><label>First Name</label><input type="text" name="first_name" placeholder="John"></div>
      <div><label>Last Name</label><input type="text" name="last_name" placeholder="Smith"></div>
    </div>
    <label>Email Address</label>
    <input type="email" name="email" placeholder="john@example.com">
    <label>Username</label>
    <input type="text" name="username" placeholder="johnsmith">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••">
    <label>Date of Birth</label>
    <input type="date" name="dob">
    <label>SSN (last 4 digits)</label>
    <!-- Sensitive field: SSN transmitted in plaintext form field -->
    <input type="text" name="ssn_last4" placeholder="1234" maxlength="4">
    <input type="hidden" name="referral" id="ref-field">
    <button type="submit" class="btn">Create Account</button>
  </form>
  <div class="back"><a href="login.html">Already have an account? Sign in</a></div>
</div>
<script>
  var ref = new URLSearchParams(location.search).get('ref');
  if (ref) document.getElementById('ref-field').value = ref;
</script>
</body>
</html>
